# =============================================================================
# Nginx di VPS (HOST) — reverse proxy untuk: https://algoodesk.iwareid.com
# =============================================================================
# Tujuan: pengunjung buka subdomain TANPA :8090. Lalu VPS meneruskan ke
#         stack Docker pada http://127.0.0.1:8090 (service `web` di docker-compose).
#
# Prasyarat:
# - DNS sudah ada A record:  algoodesk.iwareid.com  → IP VPS kamu.
# - `docker compose` sudah jalan dan `web` mendengarkan host port 8090.
# - Port 80 (dan setelah HTTPS, 443) di VPS TIDAK dipakai aplikasi lain.
#
# Cara pakai (Ubuntu dengan nginx packages):
#
#   sudo cp deploy/nginx-algoodesk.iwareid.com.conf /etc/nginx/sites-available/algoodesk.iwareid.com
#   sudo ln -sf /etc/nginx/sites-available/algoodesk.iwareid.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt dengan Certbot + plugin nginx — disarankan):
#
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d algoodesk.iwareid.com
#
# Setelah HTTPS aktif, isi blok `listen 443 ssl` di bawah bisa diganti/disinkronkan
# dengan file yang dibuat Certbot di /etc/nginx/sites-available/….
#
# Catatan Upload (Excel / file): tingkatkan batas tubuh permintaan bila perlu.
# =============================================================================

upstream algoodesk_docker_web {
    server 127.0.0.1:8090;
    keepalive 16;
}

# --- HTTP saja (cukup untuk uji cepat atau sebelum HTTPS) ---
server {
    listen 80;
    listen [::]:80;
    server_name algoodesk.iwareid.com;

    client_max_body_size 80m;

    location / {
        proxy_pass http://algoodesk_docker_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }
}

