server {
  listen 80;
  # Produksi subdomain (Host dari reverse proxy VPS) + fallback dev / IP langsung ke :8090
  server_name algoodesk.iwareid.com _;

  root /usr/share/nginx/html;
  index index.html;

  # React Router (SPA): fallback to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy API to backend service
  location /api/ {
    proxy_pass http://backend:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Serve uploads via backend (optional; keeps access control consistent)
  location /uploads/ {
    proxy_pass http://backend:5000/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
